<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logan And Danikas Wedding Playlist</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="container">
    <header class="topbar">
      <h1>Logan And Danikas Wedding Playlist</h1>
    </header>

    <section id="messageBox" class="message hidden"></section>

    <div class="app-layout">
      <div class="app-left">
        <section class="card hero-card">
          <p class="muted">Search for a song and tap Queue to add it to Logan’s iPhone.</p>
          <input
            id="searchInput"
            type="text"
            placeholder="Search for a track..."
            autocomplete="off"
          />
        </section>

        <section class="card queue-card">
          <div id="nowPlayingBox"></div>
          <div id="queuePreview"></div>
        </section>
      </div>

      <div class="app-right">
        <section class="card results-card">
          <div id="results"></div>
        </section>
      </div>
    </div>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
